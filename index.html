<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CliniTech - Iniciar Sesión</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/img/mini-logo-white.png">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Configuración de Tailwind -->
  <script src="js/config.js"></script>
  
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body class="font-poppins bg-tech-light min-h-screen flex items-center justify-center p-4">

  <main class="bg-white rounded-3xl shadow-2xl overflow-hidden w-full max-w-5xl flex flex-col lg:flex-row">
    
    <!-- Panel Izquierdo - Formulario -->
    <section class="lg:w-1/2 p-8 sm:p-12 bg-white flex flex-col justify-center min-h-[500px] lg:min-h-[600px]">
      <header class="mb-8">
        <h1 class="text-2xl sm:text-3xl font-semibold text-tech-blue">Iniciar sesión</h1>
      </header>

      <!-- Credenciales -->
      <form class="space-y-6" novalidate>

        <!-- Usuario -->
        <div>
          <label for="usuario" class="block text-sm font-medium mb-2 text-tech-blue">
            Usuario
          </label>
          <input 
            id="usuario"
            name="usuario"
            type="text"
            placeholder="Número de documento de identidad"
            required
            autocomplete="username"
            inputmode="numeric"
            pattern="[0-9]*"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-tech-blue focus:border-transparent transition-all duration-200 text-gray-600 placeholder-gray-400"
          >
          <span class="text-red-500 text-xs mt-1 hidden" id="usuario-error" aria-live="polite">
            Por favor ingresa un documento válido
          </span>
        </div>

        <!-- Contraseña -->
        <div>
          <label for="password" class="block text-sm font-medium mb-2 text-tech-blue">
            Contraseña
          </label>
          <div class="relative">
            <input 
              id="password"
              name="password"
              type="password" 
              placeholder="Ingresa tu contraseña"
              required
              autocomplete="current-password"
              minlength="6"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-tech-blue focus:border-transparent transition-all duration-200 text-gray-600 placeholder-gray-400 pr-12"
            >
            <button 
              type="button" 
              id="toggle-password"
              class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors duration-200 p-1"
              aria-label="Mostrar contraseña"
            >
              <!-- Ocultar contraseña -->
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <span class="text-red-500 text-xs mt-1 hidden" id="password-error" aria-live="polite">
            La contraseña debe tener al menos 6 caracteres
          </span>
        </div>

        <!-- Enlace olvidar contraseña -->
        <div class="text-right">
          <a href="#" class="text-tech-blue text-sm hover:underline focus:underline focus:outline-none">
            ¿Olvidaste tu contraseña?
          </a>
        </div>

        <!-- Botón Login -->
        <button 
          type="submit"
          class="w-full bg-tech-blue text-white py-3 rounded-xl font-semibold hover:bg-[#2d4190] focus:bg-[#2d4190] focus:outline-none focus:ring-2 focus:ring-tech-blue focus:ring-offset-2 transition-all duration-200 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed"
          id="submit-btn"
        >
          INICIAR SESIÓN
        </button>
      </form>
    </section>

    <!-- Panel Derecho - Bienvenida -->
    <aside class="lg:w-1/2 bg-tech-blue relative overflow-hidden flex flex-col items-center justify-center p-8 sm:p-12 text-center min-h-[400px] lg:min-h-[600px]">
      
      <!-- Decoración -->
      <div class="absolute top-10 right-10 w-24 sm:w-32 h-24 sm:h-32 bg-white bg-opacity-10 rounded-full"></div>
      <div class="absolute bottom-10 left-10 w-20 sm:w-24 h-20 sm:h-24 bg-white bg-opacity-10 rounded-full"></div>
      <div class="absolute top-1/2 left-1/4 w-12 sm:w-16 h-12 sm:h-16 bg-white bg-opacity-5 rounded-full"></div>

      <!-- Contenido -->
      <div class="relative z-10">
        <h2 class="text-3xl sm:text-4xl font-semibold text-white mb-6">¡Hola, Bienvenido!</h2>
        <p class="text-white text-base sm:text-lg mb-8 leading-relaxed max-w-md">
          Ingresa con tus datos personales para usar todas las funciones de CliniTech
        </p>
        <div class="flex justify-center">
          <img src="assets/img/Logo.png" alt="Logo CliniTech" class="h-12 sm:h-16 max-w-full object-contain filter invert brightness-0">
        </div>
      </div>
    </aside>
  </main>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
