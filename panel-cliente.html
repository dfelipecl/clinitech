<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CliniTech - Panel Cliente</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/img/mini-logo-white.png">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Configuración de Tailwind -->
  <script src="js/config.js"></script>
  
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/panels.css">
  <link rel="stylesheet" href="css/forms.css">
</head>
<body class="font-poppins bg-tech-light min-h-screen overflow-hidden">

  <div class="flex h-screen">

    <!-- Sidebar Menú -->
    <aside id="sidebar" class="w-80 bg-tech-blue flex flex-col rounded-tr-3xl rounded-br-3xl transition-all duration-300 relative z-20 pb-1">
      
      <!-- Header Sidebar -->
      <div class="p-8 flex items-center justify-between text-white">
        <div class="flex items-center gap-3" id="sidebar-header">
          <img src="assets/img/mini-logo-white.png" alt="CliniTech Logo" class="w-8 object-contain">
          <span class="font-semibold text-2xl whitespace-nowrap sidebar-text">MENÚ</span>
        </div>
        <button id="sidebar-toggle" class="text-white hover:text-gray-200 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>

      <!-- Espaciador flexible: junto con el otro flex-1 abajo, centra verticalmente el menú -->
      <div class="flex-1"></div>

      <!-- Navegación del cliente: solo tiene acceso a sus servicios, mensajes y notificaciones -->
      <nav class="px-6 space-y-1 overflow-hidden" id="navigation">

        <!-- Mis servicios: carga la vista mis-servicios.html con las reparaciones del cliente -->
        <div>
          <button 
            type="button"
            class="menu-btn single-item-btn w-full flex items-center gap-3 text-white rounded-lg px-4 py-2 transition text-sm" 
            data-section="mis-servicios"
            aria-label="Mis servicios"
          >
            <img src="assets/icons/regs.svg" alt="" aria-hidden="true" class="w-4 h-4 flex-shrink-0">
            <span class="flex-1 text-left sidebar-text">Mis servicios</span>
          </button>
        </div>

        <!-- Mensajes del cliente (funcionalidad en desarrollo) -->
        <div>
          <button 
            type="button"
            class="menu-btn single-item-btn w-full flex items-center gap-3 text-white rounded-lg px-4 py-2 transition text-sm"
            data-section="mensajes"
            aria-label="Mensajes"
          >
            <img src="assets/icons/msjs.svg" alt="" aria-hidden="true" class="w-4 h-4 flex-shrink-0">
            <span class="flex-1 text-left sidebar-text">Mensajes</span>
          </button>
        </div>
        
        <!-- Notificaciones del cliente (funcionalidad en desarrollo) -->
        <div>
          <button 
            type="button"
            class="menu-btn single-item-btn w-full flex items-center gap-3 text-white rounded-lg px-4 py-2 transition text-sm"
            data-section="notificaciones"
            aria-label="Notificaciones"
          >
            <img src="assets/icons/notis.svg" alt="" aria-hidden="true" class="w-4 h-4 flex-shrink-0">
            <span class="flex-1 text-left sidebar-text">Notificaciones</span>
          </button>
        </div>
      </nav>

      <!-- Espaciador flexible: junto con el otro flex-1 abajo, centra verticalmente el menú -->
      <div class="flex-1"></div>

      <!-- Usuario info -->
      <div class="mb-8 mx-7 bg-white rounded-xl p-4 flex items-center gap-3 shadow-sm" id="user-info">
        <div class="w-10 h-10 bg-tech-blue rounded-full flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0 sidebar-user">
          <p class="text-sm font-medium text-gray-700 truncate" id="user-name">Cliente</p>
          <p class="text-xs text-gray-500 truncate" id="user-doc">correo@gmail.com</p>
        </div>
        <button 
          type="button"
          class="text-gray-400 hover:text-gray-600 transition-colors flex-shrink-0 sidebar-user-menu" 
          title="Opciones"
          aria-label="Opciones de usuario"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Área principal -->
    <main class="flex-1 flex flex-col min-w-0">

      <!-- Header -->
      <header class="bg-white rounded-b-3xl shadow-sm px-8 py-4 mx-10 relative z-10">
        <div class="flex items-center justify-between">

          <!-- Botón menú móvil -->
          <button id="mobile-menu-toggle" class="lg:hidden text-tech-blue hover:text-tech-accent transition-colors mr-4">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
          
          <h1 class="text-2xl font-semibold text-tech-blue truncate">Panel Cliente CliniTech</h1>
          <a href="index.html" onclick="event.preventDefault(); Navigation.handleLogout();" class="text-tech-blue font-semibold flex items-center gap-3 hover:text-blue-700 transition-colors">
            <span class="hidden sm:inline">Cerrar sesión</span>
            <img src="assets/icons/cerse.svg" alt="Cerrar sesión" class="w-4 h-4 flex-shrink-0">
          </a>
        </div>
      </header>

      <!-- Contenido principal -->
      <div class="flex-1 p-10 py-12 overflow-hidden">
        <div class="bg-white rounded-3xl shadow-sm h-full relative overflow-hidden">
          
          <!-- Logo marca de agua -->
          <div class="logo-watermark">
            <img src="assets/img/Logo.png" alt="CliniTech Logo">
          </div>
          
          <!-- Contenido dinámico con scroll -->
          <div class="relative z-10 h-full overflow-y-auto" id="main-content">
            <div class="p-8">
              <div class="text-center text-gray-500 mt-56">
                <h2 class="text-2xl font-semibold mb-2">Bienvenido al Panel Cliente</h2>
                <p class="text-lg">Selecciona una opción del menú lateral para comenzar</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Overlay para móviles -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-10 lg:hidden hidden"></div>

  <!-- Scripts -->
  <!-- guard.js con data-rol="cliente": redirige al login si no hay sesión,
       o al panel técnico si el usuario autenticado es técnico -->
  <script src="js/guard.js" data-rol="cliente"></script>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/form-handler.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/view-manager.js"></script>
</body>
</html>
