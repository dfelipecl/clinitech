<!-- Vista: Registrar Técnico -->
<div class="form-view">

  <!-- Barra superior con botón Regresar -->
  <div class="form-header">
    <button type="button" class="form-back-btn" aria-label="Regresar al panel principal">
      <img src="assets/icons/return.svg" alt="" aria-hidden="true">
      <span>Regresar</span>
    </button>
  </div>

  <!-- Contenedor del formulario -->
  <div class="form-container">
    
    <!-- Logo de marca de agua -->
    <div class="logo-watermark">
      <img src="assets/img/Logo.png" alt="CliniTech Logo">
    </div>
    
    <!-- Título -->
    <h2 class="form-title">Formulario de registro de técnico</h2>

    <!-- Formulario -->
    <form id="form-registrar-tecnico" class="form-body">
      
      <div class="form-fields">
        <!-- Datos Personales -->
        <div class="form-grid form-grid-2">
          <div>
            <label for="tecnico-nombres" class="sr-only">Nombres</label>
            <input 
              type="text" 
              id="tecnico-nombres"
              name="nombres" 
              placeholder="Nombres*"
              required
              class="form-input"
              aria-label="Nombres del técnico"
            >
          </div>
          
          <div>
            <label for="tecnico-apellidos" class="sr-only">Apellidos</label>
            <input 
              type="text" 
              id="tecnico-apellidos"
              name="apellidos" 
              placeholder="Apellidos*"
              required
              class="form-input"
              aria-label="Apellidos del técnico"
            >
          </div>
        </div>

        <!-- Tipo y Número de Documento -->
        <div class="form-grid form-grid-3">
          <div class="md:col-span-1">
            <div class="form-select-wrapper">
              <div class="form-select-icon left">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
              </div>
              <label for="tecnico-tipo-documento" class="sr-only">Tipo de documento</label>
              <select 
                id="tecnico-tipo-documento"
                name="tipo_documento" 
                required
                class="form-select with-icon-left"
                aria-label="Tipo de documento"
              >
                <option value="CC">CC (Cédula de Ciudadanía)</option>
                <option value="TI">TI (Tarjeta de Identidad)</option>
                <option value="CE">CE (Cédula de Extranjería)</option>
                <option value="PP">PP (Pasaporte)</option>
              </select>
            </div>
          </div>
          
          <div class="md:col-span-2">
            <label for="tecnico-documento" class="sr-only">Número de documento</label>
            <input 
              type="text" 
              id="tecnico-documento"
              name="documento" 
              placeholder="Documento de Identidad*"
              required
              pattern="[0-9]*"
              inputmode="numeric"
              class="form-input"
              aria-label="Número de documento"
            >
          </div>
        </div>

        <!-- Sección Contacto -->
        <div class="form-section">
          <h3 class="form-section-title">Contacto</h3>
          
          <div class="form-grid form-grid-2">
            <div>
              <label for="tecnico-telefono" class="sr-only">Teléfono</label>
              <input 
                type="tel" 
                id="tecnico-telefono"
                name="telefono" 
                placeholder="Teléfono*"
                required
                class="form-input"
                aria-label="Teléfono"
              >
            </div>
            
            <div>
              <label for="tecnico-correo" class="sr-only">Correo electrónico</label>
              <input 
                type="email" 
                id="tecnico-correo"
                name="correo" 
                placeholder="Correo*"
                required
                class="form-input"
                aria-label="Correo electrónico"
              >
            </div>
          </div>
        </div>
      </div>

      <!-- Botones de acción -->
      <div class="form-actions">
        <button 
          type="submit"
          class="form-btn form-btn-primary"
        >
          Registrar
        </button>
        
        <button 
          type="button"
          class="form-btn form-btn-cancel"
        >
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>

<!-- Script específico de esta vista -->
<script src="js/views/registrar-tecnico.js"></script>
